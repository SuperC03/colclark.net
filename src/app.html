<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Colin Clark is an undergraduate student in the MIT EECS and physics departments.">
    <!-- Icon -->
    <link rel="icon" href="/icons/logo.svg" type="image/svg+xml">
    <link rel="icon" href="/icons/logo_white.ico" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/icons/logo_blue.ico" media="(prefers-color-scheme: light)" />

    <!-- Search Engine Tags -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Colin Clark",
        "url": "https://colclark.net",
        "image": "https://colclark.net/headshot.webp",
        "jobTitle": "Undergraduate Student",
        "description": "Colin Clark is an undergraduate student in the MIT EECS and physics departments.",
        "email": "contact@colclark.net",
        "sameAs": [
          "https://www.linkedin.com/in/superc03",
          "https://thetech.com/photographers/colin-clark"
        ],
        "alumniOf": [
          {
            "@type": "EducationalOrganization",
            "name": "Massachusetts Institute of Technology",
            "url": "https://mit.edu"
          }
        ],
        "worksFor": {
          "@type": "Organization",
          "name": "Massachusetts Institute of Technology",
          "url": "https://mit.edu"
        },
        "knowsLanguage": [
          {
            "@type": "Language",
            "name": "English"
          },
          {
            "@type": "Language",
            "name": "Japanese"
          }
        ],
        "knowsAbout": "Electrical Engineering, Physics, Electrochemistry"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "colclark",
        "url": "https://colclark.net",
        "publisher": {
          "@type": "Organization",
          "name": "colclark",
          "logo": {
            "@type": "ImageObject",
            "url": "https://colclark.net/icons/logo.png"
          }
        }
      }
    </script>
    <!-- Social Media Tags -->
    <meta property="og:title" content="Colin Clark | Website &amp; Portfolio" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://colclark.net" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
